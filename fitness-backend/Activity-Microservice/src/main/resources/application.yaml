server:
  port: 8082

spring:
  application:
    name: Activity-Microservice

  data:
    mongodb:
      uri: ${ACTIVITY_DB_URI}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}