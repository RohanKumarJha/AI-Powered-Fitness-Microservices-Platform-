server:
  port: 8081

spring:
  application:
    name: User-Microservice

  datasource:
    url: ${USER_DB_URL}
    username: ${USER_DB_NAME}
    password: ${USER_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
